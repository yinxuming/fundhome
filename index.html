    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var redirect = params.get('_redirect');
        if (redirect) {
          params.delete('_redirect');

          window.history.replaceState(null, '', newUrl);

    <script>
      // 诊断日志：记录页面加载各阶段时间点
      window.__t = { html: Date.now() };
      window.__log = function(msg) {
        window.__t[msg] = Date.now();

    <script>
      window.onerror = function(msg, url, line, col, error) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-detail').textContent =
          '错误: ' + msg + '\n' +
          '文件: ' + url + '\n' +
          '行号: ' + line + '\n' +
          '浏览器: ' + navigator.userAgent;
        return true;
      };
      window.onunhandledrejection = function(event) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
        document.getElementById('error-detail').textContent =
          'Promise错误: ' + (event.reason ? event.reason.message || event.reason : '未知错误') + '\n' +
          '浏览器: ' + navigator.userAgent;
      };
    </script>
    <script>
      function hideLoading() {
        var el = document.getElementById('loading');
        if (el) el.style.display = 'none';
      }

      // 30 秒后添加"仍在加载"提示（保持 loading 动画不中断）
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          var loading = document.getElementById('loading');
          if (loading) {
            var hint = document.createElement('div');
            hint.style.cssText = 'position:absolute;bottom:20%;width:100%;text-align:center;color:#888;font-size:14px;';
            hint.textContent = '正在加载，请稍候...';
            loading.appendChild(hint);
          }
        }
      }, 30000);

      // 60 秒后检查 React 是否已渲染，未渲染则显示超时错误（网络极慢或 JS 加载失败）
      setTimeout(function() {
        var root = document.getElementById('root');
        if (!root || root.children.length === 0) {
          var loading = document.getElementById('loading');
          if (loading) loading.style.display = 'none';
          var err = document.getElementById('error-msg');
          if (err) {
            err.style.display = 'block';
            var detail = document.getElementById('error-detail');
            if (detail) {
              detail.textContent =
                '页面加载超时（60s），JS 可能未成功加载。\n' +
                '浏览器: ' + navigator.userAgent + '\n' +
                '请尝试刷新页面，或清除浏览器缓存后重试。';
            }
          }
        }
      }, 60000);
    </script>
