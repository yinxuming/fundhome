name: Update Streak Rank

on:
  schedule:
    # 第一次：北京时间凌晨 2 点（UTC 18:00）
    - cron: '0 18 * * *'
    # 第二次兜底：北京时间早上 8 点（UTC 00:00），第一次后 6 小时重试
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: streak-rank
  cancel-in-progress: false

jobs:
  update-streak-rank:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get latest trade date and check if already done
        id: check
        run: |
          python3 << 'EOF'
          import datetime, zoneinfo, json, os
          tz_bj = zoneinfo.ZoneInfo('Asia/Shanghai')
          today = datetime.datetime.now(tz_bj).date()
          holidays_2026 = {
              '2026-01-01','2026-01-02','2026-01-03',
              '2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
              '2026-04-04','2026-04-05','2026-04-06',
              '2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05',
              '2026-05-30','2026-05-31','2026-06-01',
              '2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07',
          }
          # 回溯查找最近的交易日（不包含今天）作为 ed
          d = today - datetime.timedelta(days=1)
          while d.weekday() >= 5 or d.isoformat() in holidays_2026:
              d -= datetime.timedelta(days=1)
          ed = d
          # sd = ed 前一个交易日（左开右闭区间）
          sd = ed - datetime.timedelta(days=1)
          while sd.weekday() >= 5 or sd.isoformat() in holidays_2026:
              sd -= datetime.timedelta(days=1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ed={ed.isoformat()}\n')
              f.write(f'sd={sd.isoformat()}\n')

          # 检查是否已完成：streak-rank.json 的 last_trade_date == ed 则跳过
          already_done = 'false'
          try:
              with open('data/streak-rank.json', encoding='utf-8') as f:
                  data = json.load(f)
              last_trade_date = data.get('last_trade_date', '')
              if last_trade_date == ed.isoformat():
                  already_done = 'true'
                  print(f'Already done: last_trade_date={last_trade_date} == ed={ed.isoformat()}, skip fetch')
              else:
                  print(f'Not done yet: last_trade_date={last_trade_date} != ed={ed.isoformat()}, will fetch')
          except FileNotFoundError:
              print('No existing streak-rank.json, will fetch')
          except Exception as e:
              print(f'Check failed: {e}, will fetch')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'already_done={already_done}\n')
          EOF

      - name: Fetch streak rank data
        if: steps.check.outputs.already_done != 'true'
        id: fetch-data
        env:
          ED: ${{ steps.check.outputs.ed }}
          SD: ${{ steps.check.outputs.sd }}
        run: |
          mkdir -p data
          python3 << 'EOF'
          import json, urllib.request, urllib.parse, sys, datetime, zoneinfo, os, re

          tz_bj = zoneinfo.ZoneInfo('Asia/Shanghai')
          now_bj = datetime.datetime.now(tz_bj)

          ed = os.environ.get('ED', '')
          sd = os.environ.get('SD', '')
          if not ed or not sd:
              print('ERROR: ed/sd not set', file=sys.stderr)
              sys.exit(1)

          print(f'ed={ed}, sd={sd}')

          def hash_v(s):
              h = 0
              for c in s:
                  h = ((h << 5) - h) + ord(c)
                  h &= 0xFFFFFFFF
              return str(h)

          # ft=all 已包含全部基金（含 fof/qdii），只需查询一次
          all_funds = {}
          page = 1
          page_size = 10000
          while True:
              v = hash_v(ed + str(page))
              params = {
                  'op': 'dy', 'dt': 'kf', 'ft': 'all', 'rs': '', 'gs': '0',
                  'sc': 'qjzf', 'st': 'desc', 'sd': sd, 'ed': ed, 'es': '0',
                  'qdii': '', 'pi': str(page), 'pn': str(page_size), 'dx': '0', 'v': v
              }
              url = 'https://fund.eastmoney.com/data/rankhandler.aspx?' + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers={
                  'Referer': 'https://fund.eastmoney.com/data/diyfundranking.html',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      text = resp.read().decode('utf-8')
              except Exception as e:
                  print(f'Fetch failed page={page}: {e}', file=sys.stderr)
                  break

              # ⚠️ 响应不是合法 JSON：字段名无引号（{datas:[...],allRecords:25580}）
              # 不能用 json.loads 解析整个对象，需用正则单独提取 datas 数组和 allRecords
              # datas 数组本身是合法 JSON 字符串数组（["...","..."]），可以直接 loads
              datas_match = re.search(r'datas:\s*(\[.*?\])\s*,\s*allRecords', text, re.DOTALL)
              if not datas_match:
                  print(f'No datas array found page={page}', file=sys.stderr)
                  break
              try:
                  datas = json.loads(datas_match.group(1))
              except json.JSONDecodeError as e:
                  print(f'datas array parse failed page={page}: {e}', file=sys.stderr)
                  break

              if not datas:
                  break

              all_records_match = re.search(r'allRecords:\s*(\d+)', text)
              all_records = int(all_records_match.group(1)) if all_records_match else 0

              for item in datas:
                  fields = item.split(',')
                  if len(fields) < 4:
                      continue
                  fund_code = fields[0].strip()
                  fund_name = fields[1].strip() if len(fields) > 1 else ''
                  range_gain_str = fields[3].strip() if len(fields) > 3 else ''
                  # fields[9] 是区间结束日期，fields[10] 是区间结束单位净值
                  nav_date = fields[9].strip() if len(fields) > 9 else ed

                  if not fund_code:
                      continue

                  # 解析涨幅
                  try:
                      range_gain = float(range_gain_str) if range_gain_str else None
                  except ValueError:
                      range_gain = None

                  if range_gain is None:
                      # 无数据，视为非上涨
                      all_funds[fund_code] = {
                          'fund_code': fund_code,
                          'fund_name': fund_name,
                          'daily_gain': None,
                          'nav_date': nav_date,
                      }
                  else:
                      all_funds[fund_code] = {
                          'fund_code': fund_code,
                          'fund_name': fund_name,
                          'daily_gain': range_gain,
                          'nav_date': nav_date,
                      }

              if page * page_size >= all_records or len(datas) < page_size:
                  break
              page += 1

          print(f'Total funds fetched: {len(all_funds)}')

          # 读取现有 streak-rank.json
          existing = {'last_update': '', 'last_trade_date': '', 'funds': []}
          try:
              with open('data/streak-rank.json', encoding='utf-8') as f:
                  existing = json.load(f)
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f'Read existing failed: {e}', file=sys.stderr)

          existing_map = {f['fund_code']: f for f in existing.get('funds', [])}

          # 更新连涨数据
          result_funds = []
          for code, info in all_funds.items():
              daily_gain = info.get('daily_gain')
              fund_name = info.get('fund_name', '')
              nav_date = info.get('nav_date', ed)

              if daily_gain is None or daily_gain <= 0:
                  # 当日无数据或非上涨，从连涨列表中移除
                  continue

              old = existing_map.get(code)
              if old:
                  # 已在连涨列表：天数+1，涨幅累加
                  streak_days = old.get('streak_days', 0) + 1
                  streak_gain = round(old.get('streak_gain', 0) + daily_gain, 4)
              else:
                  # 新增：连涨天数=1
                  streak_days = 1
                  streak_gain = round(daily_gain, 4)

              result_funds.append({
                  'fund_code': code,
                  'fund_name': fund_name,
                  'streak_days': streak_days,
                  'streak_gain': streak_gain,
                  'latest_daily_gain': round(daily_gain, 4),
                  'latest_nav_date': nav_date,
              })

          # 按连涨天数降序，天数相同的按连涨涨幅降序
          result_funds.sort(key=lambda x: (-x['streak_days'], -x['streak_gain']))

          result = {
              'last_update': now_bj.strftime('%Y-%m-%d %H:%M:%S'),
              'last_trade_date': ed,
              'funds': result_funds,
          }

          with open('data/streak-rank.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'Updated streak rank: {len(result_funds)} funds, last_trade_date={ed}')
          EOF
          echo "data_updated=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.fetch-data.outputs.data_updated == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/streak-rank.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            today=$(date +%Y-%m-%d)
            git commit -m "chore: update streak rank ${today}"
            git push
          fi

      - name: Keep alive
        if: steps.fetch-data.outputs.data_updated != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          TODAY=$(date +%Y-%m-%d)
          if [ "$LAST_COMMIT_DATE" != "$TODAY" ]; then
            echo "No commit today, creating keep-alive commit"
            mkdir -p data
            echo "${TODAY}" > data/.keep-alive
            git add data/.keep-alive
            git commit -m "chore: keep alive ${TODAY}"
            git push
          else
            echo "Already have a commit today (${TODAY}), skipping keep-alive"
          fi

      - name: Setup Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
