name: Update Streak Rank

on:
  schedule:
    # 第一次：北京时间凌晨 2 点（UTC 18:00）
    - cron: '0 18 * * *'
    # 第二次兜底：北京时间早上 8 点（UTC 00:00），第一次后 6 小时重试
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: streak-rank
  cancel-in-progress: false

jobs:
  update-streak-rank:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Get latest trade date and check if already done
        id: check
        run: |
          python3 << 'EOF'
          import datetime, zoneinfo, json, os
          tz_bj = zoneinfo.ZoneInfo('Asia/Shanghai')
          today = datetime.datetime.now(tz_bj).date()
          holidays_2026 = {
              '2026-01-01','2026-01-02','2026-01-03',
              '2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
              '2026-04-04','2026-04-05','2026-04-06',
              '2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05',
              '2026-05-30','2026-05-31','2026-06-01',
              '2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07',
          }
          # 回溯查找最近的交易日（不包含今天）作为 ed
          d = today - datetime.timedelta(days=1)
          while d.weekday() >= 5 or d.isoformat() in holidays_2026:
              d -= datetime.timedelta(days=1)
          ed = d
          # sd = ed 前一个交易日（左开右闭区间）
          sd = ed - datetime.timedelta(days=1)
          while sd.weekday() >= 5 or sd.isoformat() in holidays_2026:
              sd -= datetime.timedelta(days=1)

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'ed={ed.isoformat()}\n')
              f.write(f'sd={sd.isoformat()}\n')

          # 检查是否已完成：streak-rank.json 和 calibration-ratio.json 都需要更新到 ed
          # 只有两者都已完成（last_trade_date == ed 且数据非空）才跳过
          # 兜底：上次异常写入（last_trade_date 更新但数据空）时强制重试
          already_done = 'false'
          streak_done = False
          calib_done = False

          try:
              with open('data/streak-rank.json', encoding='utf-8') as f:
                  data = json.load(f)
              last_trade_date = data.get('last_trade_date', '')
              funds = data.get('funds', [])
              if last_trade_date == ed.isoformat() and len(funds) > 0:
                  streak_done = True
                  print(f'Streak rank done: last_trade_date={last_trade_date}, funds={len(funds)}')
              elif last_trade_date == ed.isoformat() and len(funds) == 0:
                  print(f'Streak rank retry needed: last_trade_date={last_trade_date} but funds empty')
              else:
                  print(f'Streak rank not done: last_trade_date={last_trade_date} != ed={ed.isoformat()}')
          except FileNotFoundError:
              print('No existing streak-rank.json')
          except Exception as e:
              print(f'Streak rank check failed: {e}')

          try:
              with open('data/calibration-ratio.json', encoding='utf-8') as f:
                  data = json.load(f)
              last_trade_date = data.get('last_trade_date', '')
              funds = data.get('funds', {})
              if last_trade_date == ed.isoformat() and len(funds) > 0:
                  calib_done = True
                  print(f'Calibration done: last_trade_date={last_trade_date}, funds={len(funds)}')
              elif last_trade_date == ed.isoformat() and len(funds) == 0:
                  print(f'Calibration retry needed: last_trade_date={last_trade_date} but funds empty')
              else:
                  print(f'Calibration not done: last_trade_date={last_trade_date} != ed={ed.isoformat()}')
          except FileNotFoundError:
              print('No existing calibration-ratio.json')
          except Exception as e:
              print(f'Calibration check failed: {e}')

          if streak_done and calib_done:
              already_done = 'true'
              print('Both streak-rank and calibration are up-to-date, skip fetch')

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'already_done={already_done}\n')
          EOF

      - name: Fetch streak rank data
        if: steps.check.outputs.already_done != 'true'
        id: fetch-data
        env:
          ED: ${{ steps.check.outputs.ed }}
          SD: ${{ steps.check.outputs.sd }}
        run: |
          mkdir -p data
          python3 << 'EOF'
          import json, urllib.request, urllib.parse, sys, datetime, zoneinfo, os, re

          tz_bj = zoneinfo.ZoneInfo('Asia/Shanghai')
          now_bj = datetime.datetime.now(tz_bj)

          ed = os.environ.get('ED', '')
          sd = os.environ.get('SD', '')
          if not ed or not sd:
              print('ERROR: ed/sd not set', file=sys.stderr)
              sys.exit(1)

          print(f'ed={ed}, sd={sd}')

          def hash_v(s):
              h = 0
              for c in s:
                  h = ((h << 5) - h) + ord(c)
                  h &= 0xFFFFFFFF
              return str(h)

          # ft=all 已包含全部基金（含 fof/qdii），只需查询一次
          all_funds = {}
          page = 1
          page_size = 10000
          while True:
              v = hash_v(ed + str(page))
              params = {
                  'op': 'dy', 'dt': 'kf', 'ft': 'all', 'rs': '', 'gs': '0',
                  'sc': 'qjzf', 'st': 'desc', 'sd': sd, 'ed': ed, 'es': '0',
                  'qdii': '', 'pi': str(page), 'pn': str(page_size), 'dx': '0', 'v': v
              }
              url = 'https://fund.eastmoney.com/data/rankhandler.aspx?' + urllib.parse.urlencode(params)
              req = urllib.request.Request(url, headers={
                  'Referer': 'https://fund.eastmoney.com/data/diyfundranking.html',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              })
              try:
                  with urllib.request.urlopen(req, timeout=30) as resp:
                      text = resp.read().decode('utf-8')
              except Exception as e:
                  print(f'Fetch failed page={page}: {e}', file=sys.stderr)
                  break

              # ⚠️ 响应不是合法 JSON：字段名无引号（{datas:[...],allRecords:25580}）
              # 不能用 json.loads 解析整个对象，需用正则单独提取 datas 数组和 allRecords
              # datas 数组本身是合法 JSON 字符串数组（["...","..."]），可以直接 loads
              datas_match = re.search(r'datas:\s*(\[.*?\])\s*,\s*allRecords', text, re.DOTALL)
              if not datas_match:
                  print(f'No datas array found page={page}', file=sys.stderr)
                  break
              try:
                  datas = json.loads(datas_match.group(1))
              except json.JSONDecodeError as e:
                  print(f'datas array parse failed page={page}: {e}', file=sys.stderr)
                  break

              if not datas:
                  break

              all_records_match = re.search(r'allRecords:\s*(\d+)', text)
              all_records = int(all_records_match.group(1)) if all_records_match else 0

              for item in datas:
                  fields = item.split(',')
                  if len(fields) < 4:
                      continue
                  fund_code = fields[0].strip()
                  fund_name = fields[1].strip() if len(fields) > 1 else ''
                  range_gain_str = fields[3].strip() if len(fields) > 3 else ''
                  # fields[9] 是区间结束日期，fields[10] 是区间结束单位净值
                  nav_date = fields[9].strip() if len(fields) > 9 else ed

                  if not fund_code:
                      continue

                  # 解析涨幅
                  try:
                      range_gain = float(range_gain_str) if range_gain_str else None
                  except ValueError:
                      range_gain = None

                  if range_gain is None:
                      # 无数据，视为非上涨
                      all_funds[fund_code] = {
                          'fund_code': fund_code,
                          'fund_name': fund_name,
                          'daily_gain': None,
                          'nav_date': nav_date,
                      }
                  else:
                      all_funds[fund_code] = {
                          'fund_code': fund_code,
                          'fund_name': fund_name,
                          'daily_gain': range_gain,
                          'nav_date': nav_date,
                      }

              if page * page_size >= all_records or len(datas) < page_size:
                  break
              page += 1

          print(f'Total funds fetched: {len(all_funds)}')

          # 校验：只有成功获取数据才写入，否则视为失败跳过写入（下次重试）
          if len(all_funds) == 0:
              print('No funds fetched, skip write (will retry next run)', file=sys.stderr)
              sys.exit(0)  # 正常退出但不写入，不触发 data_updated

          # 读取现有 streak-rank.json
          existing = {'last_update': '', 'last_trade_date': '', 'funds': []}
          try:
              with open('data/streak-rank.json', encoding='utf-8') as f:
                  existing = json.load(f)
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f'Read existing failed: {e}', file=sys.stderr)

          existing_map = {f['fund_code']: f for f in existing.get('funds', [])}

          # 更新连涨数据
          result_funds = []
          for code, info in all_funds.items():
              daily_gain = info.get('daily_gain')
              fund_name = info.get('fund_name', '')
              nav_date = info.get('nav_date', ed)

              if daily_gain is None or daily_gain <= 0:
                  # 当日无数据或非上涨，从连涨列表中移除
                  continue

              old = existing_map.get(code)
              if old:
                  # 已在连涨列表：天数+1，涨幅累加
                  streak_days = old.get('streak_days', 0) + 1
                  streak_gain = round(old.get('streak_gain', 0) + daily_gain, 4)
              else:
                  # 新增：连涨天数=1
                  streak_days = 1
                  streak_gain = round(daily_gain, 4)

              result_funds.append({
                  'fund_code': code,
                  'fund_name': fund_name,
                  'streak_days': streak_days,
                  'streak_gain': streak_gain,
                  'latest_daily_gain': round(daily_gain, 4),
                  'latest_nav_date': nav_date,
              })

          # 按连涨天数降序，天数相同的按连涨涨幅降序
          result_funds.sort(key=lambda x: (-x['streak_days'], -x['streak_gain']))

          # 去重：同名基金只保留 C 类（前端 filterDuplicateFunds 逻辑）
          # 优先级：C类人民币=0 > C类=1 > A/B类人民币=2 > A/B类=3 > A类人民币=4 > A类=5 > 其他=10
          def get_base_fund_name(fund_name):
              """提取基金基础名称（去掉份额类别和币种后缀）"""
              CURRENCY = r'(?:人民币|美元|美元汇|美元现钞)'
              base = fund_name
              base = re.sub(r'[A-Z]类' + CURRENCY + r'$', '', base).strip()
              base = re.sub(r'\(.+?\)[A-Z]' + CURRENCY + r'$', '', base).strip()
              base = re.sub(r'[A-Z]\(' + CURRENCY + r'\)$', '', base).strip()
              base = re.sub(r'\(.+?\)[A-Z]$', '', base).strip()
              base = re.sub(r'\(.+?\)' + CURRENCY + r'[A-Z]$', '', base).strip()
              base = re.sub(CURRENCY + r'[A-Z]$', '', base).strip()
              patterns = [
                  r'\(A/B\).*', r'A/B\(.*', r'A\(', r'B\(', r'C\(', r'D\(', r'E\(', r'F\(', r'H\(', r'I\(', r'R\(', r'Y\(',
                  r'\(A\)', r'\(B\)', r'\(C\)', r'\(D\)', r'\(E\)', r'\(F\)', r'\(H\)', r'\(I\)', r'\(R\)', r'\(Y\)',
                  r'A/B$', r'A$', r'B$', r'C$', r'D$', r'E$', r'F$', r'H$', r'I$', r'R$', r'Y$',
              ]
              for p in patterns:
                  base = re.sub(p, '', base).strip()
              base = re.sub(r'\(.+?\)$', '', base).strip()
              return base

          def fund_class_priority(fund_name):
              """基金份额优先级（越小越高），C类优先"""
              is_rmb = '人民币' in fund_name
              is_usd = '美元' in fund_name
              is_ab = bool(re.search(r'A/B|A\\B|\(A/B\)|\(A\\B\)', fund_name))

              def has_class(letter):
                  return bool(re.search(rf'{letter}[类(]|{letter}\((?:人民币|美元|美元汇|美元现钞)\)|(.+?){letter}(?:人民币|美元|美元汇|美元现钞)|(.+?){letter}$|(?:人民币|美元|美元汇|美元现钞){letter}$|(?<=[^a-zA-Z0-9]){letter}$', fund_name))

              is_a = has_class('A') and not is_ab
              is_c = has_class('C')
              is_e = has_class('E')
              is_d = has_class('D')

              if is_c:
                  return 0 if is_rmb else 10 if is_usd else 1
              elif is_ab:
                  return 2 if is_rmb else 10 if is_usd else 3
              elif is_a:
                  return 4 if is_rmb else 10 if is_usd else 5
              elif is_e:
                  return 6 if is_rmb else 10 if is_usd else 7
              elif is_d:
                  return 8 if is_rmb else 10 if is_usd else 9
              return 10

          def deduplicate_funds(funds):
              """同名基金去重，每组只保留优先级最高的（C类优先）"""
              from collections import defaultdict
              groups = defaultdict(list)
              for f in funds:
                  base = get_base_fund_name(f['fund_name'])
                  groups[base].append(f)

              result = []
              for base, group in groups.items():
                  if len(group) == 1:
                      result.append(group[0])
                  else:
                      # 按优先级排序，取最高的
                      sorted_group = sorted(group, key=lambda x: fund_class_priority(x['fund_name']))
                      result.append(sorted_group[0])
              return result

          deduped_funds = deduplicate_funds(result_funds)
          print(f'After deduplication: {len(result_funds)} → {len(deduped_funds)} funds')

          result = {
              'last_update': now_bj.strftime('%Y-%m-%d %H:%M:%S'),
              'last_trade_date': ed,
              'funds': deduped_funds,
          }

          with open('data/streak-rank.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'Updated streak rank: {len(result_funds)} funds, last_trade_date={ed}')

          # ========== 估值校准计算 ==========
          # 调用 FundGuZhi 接口获取估算涨幅(gszzl)和实际涨幅(jzzzl)，
          # 计算 EMA 校准系数(5日窗口, α=0.33)，保存为 calibration-ratio.json
          # FundGuZhi 接口同时返回估算和实际涨幅，无需交叉比对 all_funds
          # JSON 最小化：只存 fund_code → ratio 映射

          # 1. 获取所有基金的估算涨幅和实际涨幅（FundGuZhi 接口）
          # FundGuZhi 返回: gszzl(估算涨幅), jzzzl(实际涨幅), gzrq(估值日期), jjjc(基金简称)
          # 注意: gzrq 和 gxrq 在 Data 层级，不在单个 item 中
          estimate_map = {}  # { fund_code: { 'estimate_growth': float, 'actual_growth': float, 'fund_name': str } }
          est_gzrq = ''  # 估值日期（所有基金共享，在 Data 层级）
          est_page = 1
          est_page_size = 10000
          while True:
              est_url = f'https://api.fund.eastmoney.com/FundGuZhi/GetFundGZList?type=1&sort=desc&orderType=desc&canbuy=0&pageIndex={est_page}&pageSize={est_page_size}'
              est_req = urllib.request.Request(est_url, headers={
                  'Referer': 'https://fund.eastmoney.com/',
                  'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
              })
              try:
                  with urllib.request.urlopen(est_req, timeout=30) as resp:
                      est_text = resp.read().decode('utf-8')
              except Exception as e:
                  print(f'FundGuZhi fetch failed page={est_page}: {e}', file=sys.stderr)
                  break

              try:
                  est_data = json.loads(est_text)
              except json.JSONDecodeError as e:
                  print(f'FundGuZhi parse failed page={est_page}: {e}', file=sys.stderr)
                  break

              est_data_obj = est_data.get('Data', {})
              est_list = est_data_obj.get('list', [])
              est_total = est_data.get('TotalCount', 0)
              # gzrq 在 Data 层级，所有基金共享同一估值日期
              if not est_gzrq:
                  est_gzrq = str(est_data_obj.get('gzrq', '')).strip()[:10]

              if not est_list:
                  break

              for item in est_list:
                  fc = str(item.get('bzdm', '')).strip()
                  if not fc:
                      continue
                  gszzl = item.get('gszzl')  # 估算涨幅
                  jzzzl = item.get('jzzzl')  # 实际涨幅（最新涨幅）
                  jjjc = str(item.get('jjjc', '')).strip()
                  try:
                      est_growth = float(gszzl) if gszzl else None
                  except (ValueError, TypeError):
                      est_growth = None
                  try:
                      actual_growth = float(jzzzl) if jzzzl else None
                  except (ValueError, TypeError):
                      actual_growth = None
                  estimate_map[fc] = {
                      'estimate_growth': est_growth,
                      'actual_growth': actual_growth,
                      'fund_name': jjjc,
                  }

              if est_page * est_page_size >= est_total or len(est_list) < est_page_size:
                  break
              est_page += 1

          print(f'FundGuZhi fetched: {len(estimate_map)} funds, gzrq={est_gzrq}')

          # 2. 读取现有 calibration-ratio.json 获取 prev_ema 和上次校准日期
          prev_calibrations = {}
          prev_last_trade_date = ''
          try:
              with open('data/calibration-ratio.json', encoding='utf-8') as f:
                  prev_data = json.load(f)
              prev_calibrations = prev_data.get('funds', {})
              prev_last_trade_date = prev_data.get('last_trade_date', '')
          except FileNotFoundError:
              pass
          except Exception as e:
              print(f'Read existing calibration failed: {e}', file=sys.stderr)

          # 3. 计算 EMA 校准系数
          # 校准基于 FundGuZhi 返回的 gszzl(估算涨幅) 和 jzzzl(实际涨幅)，
          # 两者对应同一天(gzrq)，无需与 ed(最新交易日) 匹配。
          # 防重复保护：如果 est_gzrq == prev_last_trade_date，说明今天已校准过，保留旧值。
          ALPHA = 0.33
          new_calibrations = {}
          matched_count = 0

          # 同一天不重复更新 EMA（避免多次运行导致 EMA 偏移）
          already_calibrated_today = bool(est_gzrq) and bool(prev_calibrations) and (est_gzrq == prev_last_trade_date)

          if already_calibrated_today:
              print(f'Calibration already done for gzrq={est_gzrq}, keeping previous {len(prev_calibrations)} values')
              new_calibrations = prev_calibrations
          else:
              for fc, info in estimate_map.items():
                  est_growth = info['estimate_growth']
                  actual_growth = info['actual_growth']
                  fund_name = info['fund_name']

                  if est_growth is None or est_growth == 0 or actual_growth is None:
                      continue

                  # 计算偏差比率
                  daily_ratio = actual_growth / est_growth
                  # 限制范围 [0.5, 5.0]：过滤极端异常值（如分红除权、数据错误），
                  # 保留极端行情（如重仓股涨停、行业突发利好导致估值更新延迟）
                  clamped_ratio = max(0.5, min(5.0, daily_ratio))

                  # EMA 递推
                  prev_ema = prev_calibrations.get(fc)
                  if prev_ema is None or prev_ema == 0:
                      new_ratio = clamped_ratio
                  else:
                      new_ratio = ALPHA * clamped_ratio + (1 - ALPHA) * prev_ema

                  new_calibrations[fc] = round(new_ratio, 4)
                  matched_count += 1

              print(f'Calibration matched: {matched_count} funds (gzrq={est_gzrq})')

              if matched_count == 0 and len(estimate_map) > 0:
                  print('WARNING: FundGuZhi returned data but no funds matched for calibration', file=sys.stderr)
                  new_calibrations = prev_calibrations

          # 4. 去重：同名基金只保留 C 类（复用连涨榜去重逻辑）
          calib_with_name = []
          for fc, ratio in new_calibrations.items():
              name = estimate_map.get(fc, {}).get('fund_name', '')
              calib_with_name.append({'fund_code': fc, 'fund_name': name, 'ratio': ratio})

          deduped_calib = deduplicate_funds(calib_with_name)

          # 转回 { fund_code: ratio } 格式
          final_calibrations = {}
          for item in deduped_calib:
              final_calibrations[item['fund_code']] = item['ratio']

          print(f'Calibration after dedup: {len(new_calibrations)} → {len(final_calibrations)} funds')

          # 5. 保存 JSON（最小化格式：{ last_trade_date, funds: { code: ratio } }）
          # last_trade_date 使用 est_gzrq（估值日期），表示校准数据基于哪一天的 gszzl/jzzzl
          calib_result = {
              'last_trade_date': est_gzrq,
              'funds': final_calibrations,
          }

          with open('data/calibration-ratio.json', 'w', encoding='utf-8') as f:
              json.dump(calib_result, f, ensure_ascii=False, separators=(',', ':'))

          print(f'Updated calibration-ratio.json: {len(final_calibrations)} funds, last_trade_date={est_gzrq}')

          # 检查 FundGuZhi 是否返回了有效估值数据
          if len(estimate_map) == 0:
              print('WARNING: FundGuZhi returned no estimate data at this time. calibration-ratio.json not updated with new data.', file=sys.stderr)
          EOF

      - name: Commit and push if changed
        if: steps.fetch-data.outputs.data_updated == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/streak-rank.json data/calibration-ratio.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            today=$(date +%Y-%m-%d)
            git commit -m "chore: update streak rank and calibration ${today}"
            git push
          fi

      - name: Keep alive
        if: steps.fetch-data.outputs.data_updated != 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          LAST_COMMIT_DATE=$(git log -1 --format=%cd --date=short)
          TODAY=$(date +%Y-%m-%d)
          if [ "$LAST_COMMIT_DATE" != "$TODAY" ]; then
            echo "No commit today, creating keep-alive commit"
            mkdir -p data
            echo "${TODAY}" > data/.keep-alive
            git add data/.keep-alive
            git commit -m "chore: keep alive ${TODAY}"
            git push
          else
            echo "Already have a commit today (${TODAY}), skipping keep-alive"
          fi

      - name: Setup Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
