name: Update Topic Cache

on:
  schedule:
    - cron: '30 8 * * 1-5'
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: topic-cache
  cancel-in-progress: false

jobs:
  update-topic-cache:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Check if today is a trading day
        id: trading-day
        run: |
          python3 -c "
          import datetime, sys
          today = datetime.date.today()
          if today.weekday() >= 5:
              print('skip=true')
              sys.exit(0)
          holidays_2026 = {
              '2026-01-01','2026-01-02','2026-01-03',
              '2026-02-16','2026-02-17','2026-02-18','2026-02-19','2026-02-20',
              '2026-04-04','2026-04-05','2026-04-06',
              '2026-05-01','2026-05-02','2026-05-03','2026-05-04','2026-05-05',
              '2026-05-30','2026-05-31','2026-06-01',
              '2026-10-01','2026-10-02','2026-10-03','2026-10-04','2026-10-05','2026-10-06','2026-10-07',
          }
          if today.isoformat() in holidays_2026:
              print('skip=true')
              sys.exit(0)
          print('skip=false')
          "

      - name: Check if cache already updated today
        if: steps.trading-day.outputs.skip != 'true'
        id: check-cache
        run: |
          if [ -f "data/topic-cache.json" ]; then
            cached_date=$(python3 -c "
            import json, sys
            with open('data/topic-cache.json') as f:
                data = json.load(f)
            for v in data.values():
                if isinstance(v, dict) and 'date' in v:
                    print(v['date'][:10])
                    sys.exit(0)
            print('')
            ")
            today=$(date +%Y-%m-%d)
            if [ "$cached_date" = "$today" ]; then
              echo "already_updated=true" >> "$GITHUB_OUTPUT"
              echo "Cache already updated today: $cached_date"
            else
              echo "already_updated=false" >> "$GITHUB_OUTPUT"
              echo "Cache is from $cached_date, need update"
            fi
          else
            echo "already_updated=false" >> "$GITHUB_OUTPUT"
            echo "No cache file found"
          fi

      - name: Fetch topic gains data
        if: steps.trading-day.outputs.skip != 'true' && steps.check-cache.outputs.already_updated != 'true'
        id: fetch-data
        run: |
          mkdir -p data
          python3 -c "
          import json, urllib.request, datetime, sys

          url = 'https://api.fund.eastmoney.com/ztjj/GetZTJJListNew?tt=0&dt=syl&st=D&_=' + str(int(datetime.datetime.now().timestamp() * 1000))
          req = urllib.request.Request(url, headers={
              'Referer': 'https://fund.eastmoney.com/',
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
          })

          try:
              with urllib.request.urlopen(req, timeout=30) as resp:
                  text = resp.read().decode('utf-8')
          except Exception as e:
              print(f'Fetch failed: {e}', file=sys.stderr)
              sys.exit(1)

          start = text.index('(')
          end = text.rindex(')')
          json_str = text[start+1:end]
          data = json.loads(json_str)

          if data.get('ErrCode') != 0:
              print(f'API error: ErrCode={data.get(\"ErrCode\")}', file=sys.stderr)
              sys.exit(1)

          items = data.get('Data', [])
          if not items:
              print('No data returned', file=sys.stderr)
              sys.exit(1)

          today = datetime.date.today().isoformat()
          now_str = datetime.datetime.now().strftime('%Y-%m-%d %H:%M:%S')

          existing = {}
          try:
              with open('data/topic-cache.json') as f:
                  existing = json.load(f)
          except FileNotFoundError:
              pass

          result = {}
          for item in items:
              name = item['INDEXNAME']
              code = item['INDEXCODE']
              gain = item.get('D', 0)

              old_entry = existing.get(name, {})
              old_gains = old_entry.get('dailyGains', {}) if isinstance(old_entry, dict) else {}

              daily_gains = dict(old_gains)
              daily_gains[today] = gain

              sorted_dates = sorted(daily_gains.keys(), reverse=True)
              for d in sorted_dates[30:]:
                  del daily_gains[d]

              result[name] = {
                  'id': code,
                  'name': name,
                  'date': now_str,
                  'dailyGains': daily_gains
              }

          with open('data/topic-cache.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'Updated {len(result)} topics, date={now_str}')
          "
          echo "data_updated=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.fetch-data.outputs.data_updated == 'true'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/topic-cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            today=$(date +%Y-%m-%d)
            git commit -m "chore: update topic cache ${today}"
            git push
          fi

      - name: Setup Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        if: steps.fetch-data.outputs.data_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        if: steps.fetch-data.outputs.data_updated == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
